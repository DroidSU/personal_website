name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Runs every time you push to the main branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Updated to v4 for Node 20+ support
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Removed fixed version to use the latest stable Flutter

      - run: flutter pub get
      
      # The base-href MUST match your GitHub repository name
      - run: flutter build web --release --base-href "/personal_website/"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4 # Updated to v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
