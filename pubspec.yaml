name: the_mobile_explorer
description: "Sujoy Dutta | The Mobile Explorer - Portfolio"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^12.1.3
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  font_awesome_flutter: ^10.6.0
  visibility_detector: ^0.4.0+2
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.4.2
  cached_network_image: ^3.4.1
  flutter_markdown: ^0.7.5
  equatable: ^2.0.7
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  uuid: ^4.3.3
  intl: ^0.19.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
